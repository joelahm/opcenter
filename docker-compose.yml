services:
  db:
    image: mysql:8.0
    container_name: fritzie_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: fritzie_dashboard
      MYSQL_USER: fritzie
      MYSQL_PASSWORD: fritzie123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
      interval: 5s

volumes:
  mysql_data:
